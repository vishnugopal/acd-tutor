<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <!-- YOU -->
  <rect x="50" y="10" width="460" height="58" rx="10" fill="#fbfaf8" stroke="#e9e5de" stroke-width="1.5"/>
  <text x="280" y="32" font-size="10" font-weight="700" letter-spacing="1.2" fill="#6b6b6b" text-anchor="middle">YOU</text>
  <text x="280" y="52" font-size="13" fill="#1a1a1a" text-anchor="middle">type in a terminal · edit <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11.5" fill="#ad2955">lesson-N.ts</tspan> in your editor</text>

  <!-- arrow -->
  <text x="280" y="89" font-size="16" fill="#d23669" text-anchor="middle">↓</text>
  <text x="280" y="103" font-size="10.5" fill="#6b6b6b" text-anchor="middle">readline REPL</text>

  <!-- CLI -->
  <rect x="50" y="112" width="460" height="70" rx="10" fill="#fbfaf8" stroke="#e9e5de" stroke-width="1.5"/>
  <text x="280" y="134" font-size="10" font-weight="700" letter-spacing="1.2" fill="#6b6b6b" text-anchor="middle">CLI</text>
  <text x="280" y="153" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#ad2955" text-anchor="middle">src/main.ts</text>
  <text x="280" y="171" font-size="11" fill="#6b6b6b" text-anchor="middle">@flue/sdk · SSE streaming · one instance id</text>

  <!-- arrow -->
  <text x="280" y="203" font-size="16" fill="#d23669" text-anchor="middle">↓</text>
  <text x="280" y="217" font-size="10.5" fill="#6b6b6b" text-anchor="middle">HTTP · POST /agents/main/:id</text>

  <!-- FLUE SERVER -->
  <rect x="50" y="226" width="460" height="104" rx="10" fill="#fdf7f9" stroke="#d23669" stroke-width="2"/>
  <text x="280" y="250" font-size="10" font-weight="700" letter-spacing="1.2" fill="#d23669" text-anchor="middle">FLUE SERVER</text>
  <text x="280" y="271" font-size="13" fill="#1a1a1a" text-anchor="middle">agent <tspan font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="11.5" fill="#ad2955">"main"</tspan></text>

  <!-- pills -->
  <g font-size="9.5" fill="#555">
    <rect x="60" y="288" width="138" height="22" rx="11" fill="#ffffff" stroke="#e9e5de"/>
    <text x="129" y="302.5" text-anchor="middle">instructions — identity</text>

    <rect x="206" y="288" width="152" height="22" rx="11" fill="#ffffff" stroke="#e9e5de"/>
    <text x="282" y="302.5" text-anchor="middle">acd-tutor skill — pedagogy</text>

    <rect x="366" y="288" width="136" height="22" rx="11" fill="#ffffff" stroke="#e9e5de"/>
    <text x="434" y="302.5" text-anchor="middle">local() sandbox — hands</text>
  </g>

  <!-- arrow -->
  <text x="280" y="351" font-size="16" fill="#d23669" text-anchor="middle">↓</text>
  <text x="280" y="365" font-size="10.5" fill="#6b6b6b" text-anchor="middle">writes lessons · opens $EDITOR</text>

  <!-- WORKSPACE -->
  <rect x="50" y="374" width="460" height="76" rx="10" fill="#fbfaf8" stroke="#e9e5de" stroke-width="1.5"/>
  <text x="280" y="396" font-size="10" font-weight="700" letter-spacing="1.2" fill="#6b6b6b" text-anchor="middle">WORKSPACE</text>
  <text x="280" y="416" font-size="12" font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#ad2955" text-anchor="middle">/tmp/acd-tutor/scratch/lesson-1.ts</text>
  <text x="280" y="436" font-size="11" fill="#6b6b6b" text-anchor="middle">← you edit this; your edits are your answers</text>
</svg>
